# Local development PostgreSQL for motzworks.
#   docker compose up -d
#   cp config.example.yaml config.yaml
#   go run ./cmd/motzworks migrate up
services:
  postgres:
    image: postgres:16
    container_name: motzworks-pg
    environment:
      POSTGRES_USER: motzworks
      POSTGRES_PASSWORD: motzworks
      POSTGRES_DB: motzworks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motzworks"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
